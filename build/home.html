<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/lib/jquery-ui.min.css" rel="stylesheet" media="all">
    <link href="css/lib/bootstrap-grid.min.css" rel="stylesheet" media="all">
    <link href="css/main.min.css" rel="stylesheet" media="all">
    <link rel="icon" href="images/favicon.png" sizes="32x32" type="image/png">
    <title>Homepage</title>
  </head>
  <body>
    <header class="header" id="header">
      <div class="navbar">
        <div class="buttons-left">
          <div class="logo"><img src="../../images/secura-insurance_logo.svg" alt="Secura Insurance"></div>
          <div class="directions"><a class="link" href="#inicio">Inicio</a><a class="link" href="#renovaciones">Próximas renovaciones</a></div>
        </div>
        <div class="right-nav-buttons">
          <div class="user-menu-wrapper">
            <div class="user-menu-window">
              <section>
                <h1 class="titulo">Mi perfil</h1>
                <p class="texto">
                  En este espacio puedes acceder, modificar, 
                  gestionar y consultar todo lo relacionado con
                  tus servicios de energía. Fácil y rápido.
                </p>
                            <button class="submenu-option-style"><span class="icon user"></span><span class="text">Mis datos personales</span></button>
                            <button class="submenu-option-style"><span class="icon lock"></span><span class="text">Mi contrasña</span></button>
                            <button class="submenu-option-style"><span class="icon phone"></span><span class="text">Contacto</span></button>
                            <button class="submenu-option-style"><span class="icon power-off"></span><span class="text">Cerrar sesión</span></button>
              </section>
            </div>
          </div>
          <button class="user-button"><span class="icon user"></span><span class="title">Mi perfil</span><span class="icon arrow-dropdown"></span></button>
          <button class="globe-button"><span class="icon globe"></span><span class="title">Español</span><span class="icon arrow-dropdown"></span></button>
          <div class="globe-menu-wrapper">
            <div class="globe-menu-window">
                          <button class="language-option"><span class="text">Español</span></button>
                          <button class="language-option"><span class="text">English</span></button>
                          <button class="language-option"><span class="text">Catalán</span></button>
                          <button class="language-option"><span class="text">Gallego</span></button>
                          <button class="language-option"><span class="text">Euskera</span></button>
            </div>
          </div>
          <div class="burguer-menu"><span class="icon burger_menu"></span></div>
          <div class="close"><span class="icon close"></span></div>
        </div>
      </div>
    </header>
    <main class="main-content" id="main-content">
      <div class="home-hero" style="background-color: #7691cfff; min-height: 400px;">
        <h1>Bienvenido a Secura Insurance</h1>
        <p>Este es el área de contenido con fondo visible.</p>
      </div>
    </main>
    <footer class="footer" id="footer">
      <div class="footer__container"></div>
    </footer>
    <script src="js/main.js"></script>
  </body>
</html>
